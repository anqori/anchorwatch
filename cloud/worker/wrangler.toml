name = "anqori-anchorwatch-relay"
main = "src/index.js"
compatibility_date = "2026-02-12"
workers_dev = false
routes = [{ pattern = "aw-cloud.anqori.com", custom_domain = true }]

[vars]
ALLOWED_ORIGIN = "*"
BUILD_VERSION = "run-unknown"
WS_TICKET_TTL_MS = "60000"
# Configure pre-seeded boats via the PRECONFIGURED_BOATS_JSON worker secret.

[env.dev]
name = "anqori-anchorwatch-relay-dev"
workers_dev = false
routes = [{ pattern = "dev-aw-cloud.anqori.com", custom_domain = true }]

[env.dev.vars]
ALLOWED_ORIGIN = "*"
BUILD_VERSION = "dev-unknown"
WS_TICKET_TTL_MS = "60000"

[[env.dev.durable_objects.bindings]]
name = "BOAT_PIPE"
class_name = "BoatPipeDurableObject"

[[env.dev.durable_objects.bindings]]
name = "BOAT_REGISTRY"
class_name = "BoatRegistryDurableObject"

[[durable_objects.bindings]]
name = "BOAT_PIPE"
class_name = "BoatPipeDurableObject"

[[durable_objects.bindings]]
name = "BOAT_REGISTRY"
class_name = "BoatRegistryDurableObject"

[[migrations]]
tag = "v1"
new_classes = ["BoatPipeDurableObject"]

[[migrations]]
tag = "v2"
new_classes = ["BoatRegistryDurableObject"]
